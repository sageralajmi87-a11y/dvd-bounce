<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird - Mobile Optimized</title>
    <style>
        @font-face {
            font-family: 'FlappyFont';
            src: url('https://cdn.jsdelivr.net/gh/paulkr/Flappy-Bird@master/lib/res/fonts/flappy-font.ttf');
            font-display: swap;
        }
        body { 
            margin: 0; padding: 0; display: flex; 
            justify-content: center; align-items: center; 
            height: 100vh; background-color: #111; overflow: hidden; 
            touch-action: manipulation;
        }
        canvas { 
            height: 100vh; width: auto; aspect-ratio: 288 / 512; 
            image-rendering: -webkit-optimize-contrast; image-rendering: pixelated;
            background-color: #70c5ce;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas" width="288" height="512"></canvas>
<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d", { alpha: false }); // Performance boost: disable alpha

    let frames = 0, score = 0, bestScore = localStorage.getItem("bestScore") || 0;
    let isPaused = false, flashAlpha = 0, globalFade = 0;
    let currentState = 0;
    const state = { getReady: 0, game: 1, over: 2, restarting: 3 };

    let gameOverY = 512, canRestart = false;

    // --- AUDIO OPTIMIZATION ---
    function loadSFX(url) {
        const audio = new Audio(url);
        audio.preload = 'auto';
        return audio;
    }

    const sfx_wing = loadSFX('https://www.image2url.com/r2/default/audio/1776087120205-5e6ba1e1-0b20-41a4-9d91-9f90acd3c630.mp3');
    const sfx_point = loadSFX('https://www.image2url.com/r2/default/audio/1776087167616-352a432e-76d7-40fd-aa84-faf59b50f22c.mp3');
    const sfx_swooshing = loadSFX('https://www.image2url.com/r2/default/audio/1776087204847-e58af320-48e2-424b-a4bb-08ad9625365a.mp3');
    const sfx_die = loadSFX('https://www.image2url.com/r2/default/audio/1776087239856-89dcf4f3-5816-4492-85ab-4f261c1c7f95.mp3');
    const sfx_hit = loadSFX('https://www.image2url.com/r2/default/audio/1776087271427-c46de118-8c71-44fb-800d-d783e4d62a6c.mp3');

    // --- IMAGE ASSETS ---
    const spriteBaseUrl = "https://raw.githubusercontent.com/samuelcust/flappy-bird-assets/master/sprites/";
    const bgImg = new Image(); bgImg.src = spriteBaseUrl + "background-day.png";
    const baseImg = new Image(); baseImg.src = spriteBaseUrl + "base.png";
    const pipeImg = new Image(); pipeImg.src = spriteBaseUrl + "pipe-green.png";
    const gameOverImg = new Image(); gameOverImg.src = spriteBaseUrl + "gameover.png";
    const messageImg = new Image(); messageImg.src = spriteBaseUrl + "message.png";

    const birdSprites = [new Image(), new Image(), new Image()];
    birdSprites[0].src = spriteBaseUrl + "yellowbird-downflap.png";
    birdSprites[1].src = spriteBaseUrl + "yellowbird-midflap.png";
    birdSprites[2].src = spriteBaseUrl + "yellowbird-upflap.png";

    function triggerAction() {
        if (isPaused || currentState === state.restarting) return;
        if (currentState === state.getReady) {
            sfx_swooshing.play().catch(()=>{});
            currentState = state.game;
            bird.flap();
            sfx_wing.currentTime = 0; sfx_wing.play().catch(()=>{});
        } else if (currentState === state.game) {
            bird.flap();
            sfx_wing.currentTime = 0; sfx_wing.play().catch(()=>{});
        } else if (currentState === state.over && canRestart) {
            sfx_swooshing.play().catch(()=>{});
            currentState = state.restarting;
        }
    }

    function resetGameLogic() {
        pipes.reset(); bird.reset();
        score = 0; gameOverY = 512; canRestart = false;
        currentState = state.getReady;
    }

    function endGame() {
        if (currentState !== state.game) return;
        sfx_hit.play().catch(()=>{});
        setTimeout(() => { sfx_die.play().catch(()=>{}); }, 200);
        flashAlpha = 1.0; 
        currentState = state.over;
        setTimeout(() => { canRestart = true; }, 1000); // Shorter cooldown for better mobile feel
        if(score > bestScore) {
            bestScore = score;
            localStorage.setItem("bestScore", bestScore);
        }
    }

    // Performance Optimized Inputs
    canvas.addEventListener("touchstart", (e) => {
        e.preventDefault();
        let rect = canvas.getBoundingClientRect();
        let scale = canvas.width / rect.width;
        let x = (e.touches[0].clientX - rect.left) * scale;
        let y = (e.touches[0].clientY - rect.top) * scale;
        if (x < 50 && y < 50 && currentState === state.game) { 
            isPaused = !isPaused; sfx_swooshing.play().catch(()=>{}); 
        } else triggerAction();
    }, { passive: false });

    document.addEventListener("keydown", (e) => { 
        if (e.code === "Space" || e.code === "ArrowUp") { e.preventDefault(); triggerAction(); }
    });

    const bird = {
        x: 60, y: 200, w: 34, h: 24, gravity: 0.30, jump: 5.2, speed: 0, frame: 0,
        reset() { this.y = 200; this.speed = 0; },
        flap() { this.speed = -this.jump; },
        draw() {
            ctx.save(); ctx.translate(this.x, this.y);
            let rot = Math.min(Math.PI/2, Math.max(-Math.PI/4, this.speed * 0.15));
            ctx.rotate(rot);
            ctx.drawImage(birdSprites[this.frame], -17, -12);
            ctx.restore();
        },
        update() {
            if (isPaused) return;
            if (frames % 6 === 0) this.frame = (this.frame + 1) % 3;
            if (currentState === state.getReady) this.y = 200 + Math.sin(frames / 10) * 8;
            else if (currentState !== state.over && currentState !== state.restarting) {
                this.speed += this.gravity; this.y += this.speed;
                if(this.y + 12 >= 400) endGame();
            }
        }
    };

    const pipes = {
        position: [], w: 52, h: 320, gap: 115, dx: 2.8,
        reset() { this.position = []; },
        draw() {
            for(let p of this.position) {
                ctx.save();
                ctx.translate(p.x, p.y + this.h);
                ctx.scale(1, -1);
                ctx.drawImage(pipeImg, 0, 0, this.w, this.h);
                ctx.restore();
                ctx.drawImage(pipeImg, p.x, p.y + this.h + this.gap, this.w, this.h);
            }
        },
        update() {
            if(currentState !== state.game || isPaused) return;
            if(frames % 95 === 0) this.position.push({ x: 288, y: -240 * (Math.random() + 0.2), passed: false });
            for(let i = 0; i < this.position.length; i++) {
                let p = this.position[i];
                if(bird.x + 12 > p.x && bird.x - 12 < p.x + this.w) {
                    if(bird.y - 10 < p.y + this.h || bird.y + 10 > p.y + this.h + this.gap) endGame();
                }
                if (!p.passed && bird.x > p.x + (this.w/2)) { p.passed = true; score++; sfx_point.play().catch(()=>{}); }
                p.x -= this.dx;
                if(p.x + this.w <= -50) { this.position.shift(); i--; }
            }
        }
    };

    function loop() {
        ctx.fillStyle = "#70c5ce"; // Manually draw background to clear
        ctx.fillRect(0, 0, 288, 512);
        
        ctx.drawImage(bgImg, 0, 0);
        pipes.draw();
        
        let groundX = (frames * (isPaused || currentState === state.over ? 0 : -2.8)) % 48;
        ctx.drawImage(baseImg, groundX, 400); ctx.drawImage(baseImg, groundX + 288, 400);
        
        bird.draw();

        if(currentState === state.getReady) {
            ctx.drawImage(messageImg, 52, 100);
        } else if(currentState === state.over || currentState === state.restarting) {
            if (gameOverY > 160) gameOverY -= 12; 
            ctx.drawImage(gameOverImg, 48, gameOverY);
            ctx.fillStyle = "#FFF"; ctx.strokeStyle = "#000"; ctx.lineWidth = 4; ctx.font = `40px FlappyFont`; ctx.textAlign = "center";
            ctx.strokeText(score, 144, gameOverY + 100); ctx.fillText(score, 144, gameOverY + 100);
            ctx.font = `20px FlappyFont`;
            ctx.strokeText("BEST " + bestScore, 144, gameOverY + 140); ctx.fillText("BEST " + bestScore, 144, gameOverY + 140);
        } else {
            ctx.fillStyle = "#FFF"; ctx.strokeStyle = "#000"; ctx.lineWidth = 4; ctx.font = `50px FlappyFont`; ctx.textAlign = "center";
            ctx.strokeText(score, 144, 70); ctx.fillText(score, 144, 70);
        }

        if (flashAlpha > 0) {
            ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
            ctx.fillRect(0, 0, 288, 512);
            flashAlpha -= 0.05;
        }

        if (currentState === state.restarting) {
            globalFade += 0.08;
            if (globalFade >= 1) resetGameLogic();
        } else if (globalFade > 0) {
            globalFade -= 0.08;
        }

        if (globalFade > 0) {
            ctx.fillStyle = `rgba(0,0,0,${globalFade})`;
            ctx.fillRect(0,0,288,512);
        }

        bird.update(); pipes.update();
        if (!isPaused && currentState !== state.over) frames++;
        requestAnimationFrame(loop);
    }
    
    // Start loop once images load
    bgImg.onload = () => { requestAnimationFrame(loop); };
</script>
</body>
</html>
